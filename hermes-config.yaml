# Hermes Agent MCP Configuration for Hermes History Clockchain
# Add this to your ~/.hermes/config.yaml under mcp_servers:
#
# For remote deployment:
mcp_servers:
  hermes-clockchain:
    url: "https://your-clockchain-url.example.com/mcp"
    headers:
      Authorization: "Bearer YOUR_WRITER_TOKEN"
    timeout: 120
    connect_timeout: 30
    tools:
      resources: true
      prompts: false

